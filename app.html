<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ether AI | Precision Scanner</title>

    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --primary: #00f2fe;
        --accent: #f093fb;
        --glass: rgba(255, 255, 255, 0.05);
      }

      body {
        margin: 0;
        background: #050505;
        color: white;
        font-family: "Rajdhani", sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        overflow: hidden;
        transition: background 0.5s ease;
      }

      /* Dynamic Glow Background */
      .bg-glow {
        position: absolute;
        width: 400px;
        height: 400px;
        background: var(--primary);
        filter: blur(150px);
        opacity: 0.2;
        border-radius: 50%;
        z-index: -1;
        transition: all 0.8s ease;
      }

      .main-wrapper {
        display: flex;
        gap: 30px;
        align-items: center;
        padding: 20px;
        z-index: 10;
      }

      /* Scanner Box */
      .scanner-box {
        position: relative;
        width: 640px;
        height: 480px;
        border-radius: 20px;
        border: 2px solid var(--glass);
        box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
        background: #000;
        overflow: hidden;
      }

      video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transform: scaleX(-1);
      }
      canvas {
        position: absolute;
        top: 0;
        left: 0;
        transform: scaleX(-1);
      }

      /* Modern Data Panel */
      .info-panel {
        width: 300px;
        display: flex;
        flex-direction: column;
        gap: 15px;
      }

      .data-card {
        background: var(--glass);
        backdrop-filter: blur(15px);
        padding: 20px;
        border-radius: 15px;
        border-left: 5px solid var(--primary);
        transition: all 0.3s;
      }

      .data-card h3 {
        margin: 0;
        font-size: 14px;
        color: var(--primary);
        letter-spacing: 2px;
      }
      .data-card div {
        font-family: "Orbitron", sans-serif;
        font-size: 28px;
        margin-top: 10px;
      }

      /* Loading Animation */
      #loader {
        position: fixed;
        inset: 0;
        background: #000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 1000;
      }

      .pulse {
        width: 80px;
        height: 80px;
        border: 4px solid var(--primary);
        border-radius: 50%;
        animation: pulse 1.5s infinite;
      }

      @keyframes pulse {
        0% {
          transform: scale(0.8);
          opacity: 1;
        }
        100% {
          transform: scale(1.2);
          opacity: 0;
        }
      }
    </style>
  </head>
  <body>
    <div id="loader">
      <div class="pulse"></div>
      <h2 style="margin-top: 20px; letter-spacing: 5px">ETHER AI SYSTEM</h2>
      <p id="load-status">Downloading Neural Networks...</p>
    </div>

    <div class="bg-glow" id="glow"></div>

    <div class="main-wrapper">
      <div class="scanner-box">
        <video id="video" autoplay muted playsinline></video>
      </div>

      <div class="info-panel">
        <div class="data-card" id="gender-card">
          <h3>TARGET_GENDER</h3>
          <div id="gender-val">---</div>
        </div>
        <div class="data-card">
          <h3>ACCURACY_SCORE</h3>
          <div id="conf-val">0%</div>
        </div>
        <div class="data-card">
          <h3>SYSTEM_STATUS</h3>
          <div style="font-size: 18px; color: #00ff00">LIVE FEED ACTIVE</div>
        </div>
      </div>
    </div>

    <script>
      const video = document.getElementById("video");
      const glow = document.getElementById("glow");
      const loadStatus = document.getElementById("load-status");

      async function startSystem() {
        try {
          // SsdMobilenetv1 is more accurate than TinyFaceDetector
          const MODEL_URL =
            "https://raw.githubusercontent.com/vladmandic/face-api/master/model/";

          await faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL);
          await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
          await faceapi.nets.ageGenderNet.loadFromUri(MODEL_URL);

          loadStatus.innerText = "Accessing Camera...";
          startCamera();
        } catch (err) {
          loadStatus.innerText = "Fatal Error: Brain Not Found!";
        }
      }

      function startCamera() {
        navigator.mediaDevices
          .getUserMedia({ video: { frameRate: 30 } })
          .then((stream) => {
            video.srcObject = stream;
            document.getElementById("loader").style.display = "none";
          });
      }

      video.addEventListener("play", () => {
        const canvas = faceapi.createCanvasFromMedia(video);
        document.querySelector(".scanner-box").append(canvas);
        const displaySize = { width: 640, height: 480 };
        faceapi.matchDimensions(canvas, displaySize);

        setInterval(async () => {
          // Using SSD Mobilenet for higher accuracy
          const detections = await faceapi
            .detectAllFaces(video)
            .withFaceLandmarks()
            .withAgeAndGender();

          canvas.getContext("2d").clearRect(0, 0, canvas.width, canvas.height);

          if (detections && detections.length > 0) {
            const resized = faceapi.resizeResults(detections, displaySize);

            // Custom box styling
            resized.forEach((detection) => {
              const box = detection.detection.box;
              const drawBox = new faceapi.draw.DrawBox(box, {
                label: Math.round(detection.age) + " Year Old",
                lineWidth: 2,
              });
              drawBox.draw(canvas);
            });

            const { gender, genderProbability } = detections[0];
            const gVal = document.getElementById("gender-val");
            const cVal = document.getElementById("conf-val");

            gVal.innerText = gender.toUpperCase();
            cVal.innerText = Math.round(genderProbability * 100) + "%";

            // Dynamic Theme Switching
            if (gender === "male") {
              document.documentElement.style.setProperty(
                "--primary",
                "#00f2fe",
              );
              glow.style.background = "#00f2fe";
            } else {
              document.documentElement.style.setProperty(
                "--primary",
                "#f093fb",
              );
              glow.style.background = "#f093fb";
            }
          }
        }, 150);
      });

      startSystem();
    </script>
  </body>
</html>
